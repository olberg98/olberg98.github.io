<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java Lærlingspill</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/java.min.js"></script>
</head>
<body>

<!-- HEADER -->
<header class="header">
    <div class="header-inner">
        <div class="logo" onclick="navigate('home')">
            <span class="logo-icon">☕</span>
            <span class="logo-text">Java<strong>Spill</strong></span>
        </div>
        <nav class="header-nav">
            <button class="nav-btn" onclick="navigate('home')">🏠 Hjem</button>
            <div id="save-indicator" class="save-indicator hidden">💾 Lagret</div>
            <div id="xp-badge" class="xp-badge">⚡ <span id="xp-count">0</span> XP</div>
            <button class="nav-btn settings-btn" onclick="openSettings()" title="Innstillinger">⚙️</button>
        </nav>
    </div>
</header>

<!-- SETTINGS MODAL -->
<div id="settings-modal" class="modal-overlay hidden">
    <div class="modal-box">
        <div class="modal-header">
            <h2>⚙️ Innstillinger</h2>
            <button class="modal-close" onclick="closeSettings()">✕</button>
        </div>
        <div class="modal-body">
            <div class="modal-info-box">
                <strong>💾 Om lagring</strong><br>
                Fremgangen din lagres automatisk og blir der selv om du lukker appen.
                Bruk eksport/import for å sikkerhetskopiere eller overføre fremgangen.
            </div>
            <div class="modal-actions">
                <button class="modal-btn btn-export" onclick="exportProgress()">
                    📤 Eksporter lagring
                    <span class="btn-sub">Last ned fremgangen din som fil</span>
                </button>
                <label class="modal-btn btn-import">
                    📥 Importer lagring
                    <span class="btn-sub">Last inn en tidligere lagret fil</span>
                    <input type="file" accept=".json" onchange="importProgress(event)" style="display:none">
                </label>
            </div>
            <hr class="modal-divider">
            <button class="modal-btn btn-reset" onclick="resetAll()">
                🗑️ Tilbakestill all fremgang
                <span class="btn-sub">Sletter all XP og fullførte øvelser</span>
            </button>
        </div>
    </div>
</div>

<!-- MAIN APP -->
<main id="app">
    <!-- Views are injected here by JavaScript -->
</main>

<!-- TOAST NOTIFICATION -->
<div id="toast" class="toast hidden"></div>

<!-- courseData.js is generated by CourseDataExporter at startup.
     In Android mode it defines window.COURSE_DATA and replaces all API calls. -->
<script src="js/courseData.js" onerror="window.COURSE_DATA=null"></script>
<script src="js/app.js"></script>
</body>
</html>
